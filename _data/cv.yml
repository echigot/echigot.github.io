        start_date: 2023
        end_date: 2026
        highlights:
          - "Research topic: Synthetic-to-Real Image-Based Domain Adaptation for Robust Object Recognition."
          - "Industrial PhD in collaboration with Airbus."
          - "Advisors: Thomas Oberlin, Dennis G. Wilson, Meriem Ghrib, Manon Huguenin."

      - institution: ENSEEIHT
