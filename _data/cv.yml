cv:
  name: Estelle Chigot
  label: PhD Candidate in Computer Vision
  email: estelle.chigot@gmail.com
  location: Toulouse, France
  image: ""
  summary: >
    Industrial PhD candidate at ISAE-SUPAERO and Airbus (CIFRE, 2023–2026),
    working on synthetic-to-real domain adaptation for robust runway detection
    under adverse weather. Research focuses on diffusion-based style transfer
    and multi-objective evolutionary algorithm optimisation.

