    Experience:
      - company: Airbus & ISAE-SUPAERO
        position: Industrial PhD Candidate
        location: Toulouse, France
        start_date: 2023
        end_date: 2026
        highlights:
          - "Researcher within the vision-based navigation team at Airbus."
          - "Designed a diffusion-based style transfer method for synthetic-to-real domain adaptation using segmentation maps, with a focus on adverse weather conditions (CVIU 2025)."
          - "Proposed an evolutionary algorithm-based optimization framework for style transfer pipelines (EvoStar 2026)."
          - "Evaluated the impact of simulated data and domain adaptation methods for Airbus runway detection model (CAIP 2025)."
          - "Applied and benchmarked synthetic-to-real style transfer models for runway images under adverse conditions."
          - "Taught computer vision (generative models), machine learning, object-oriented programming, evolutionary optimization and Linux/Python to Master students."
          - "Supervised two research interns (2024, 2025)."

      - company: Thales AVS
        position: Computer Vision Researcher
        location: Toulouse, France
        start_date: 2021
        end_date: 2022
        highlights:
          - "Developed a Unity-based synthetic data generation pipeline using domain randomization for embedded drone detection."
          - "Trained and evaluated embedded drone detection models."
          - "Compared 3D generated datasets with GAN-based generation approaches."

